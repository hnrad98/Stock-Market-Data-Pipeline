version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('BQ_DATASET', 'stock_market') }}"
    tables:
      - name: raw_stock_prices
        description: "Raw stock price data loaded from Yahoo Finance via GCS"
        columns:
          - name: date
            description: "Trading date"
          - name: ticker
            description: "Stock ticker symbol"
          - name: close
            description: "Closing price"

models:
  - name: stg_stock_prices
    description: "Cleaned and standardized stock price data"
    tests:
      - unique:
          column_name: "concat(cast(trade_date as string), '-', ticker)"
    columns:
      - name: trade_date
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: sector
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
      - name: volume
        tests:
          - not_null
